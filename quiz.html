    } else if (q.type === 'mc') {
      let html = '<div class="mc-choices">';
      q.choices.forEach((choice, i) => {
        html += `<button type="button" class="mc-choice" data-choice="${escapeHtml(choice)}"><span class="num-key">${i+1}</span><span>${escapeHtml(choice)}</span></button>`;
      });
      html += '</div>';
      answerArea.innerHTML = html;
      answerArea.querySelectorAll('.mc-choice').forEach(btn => {
        btn.addEventListener('click', () => {
          if (awaitingNext) return;
          handleSubmit(btn.dataset.choice);
        });
      });
      const first = answerArea.querySelector('.mc-choice');
      if (first) first.focus();
    } else if (q.type === 'ox') {
      let html = '<div class="ox-choices">';
      q.choices.forEach(choice => {
        html += `<button type="button" class="ox-choice" data-choice="${escapeHtml(choice)}">${escapeHtml(choice)}</button>`;
      });
      html += '</div>';
      answerArea.innerHTML = html;
      answerArea.querySelectorAll('.ox-choice').forEach(btn => {
        btn.addEventListener('click', () => {
          if (awaitingNext) return;
          handleSubmit(btn.dataset.choice);
        });
      });
      const first = answerArea.querySelector('.ox-choice');
      if (first) first.focus();
    }
  }

  function updateButtons() {
    if (awaitingNext) {
      submitBtn.style.display = '';
      submitBtn.textContent = '다음 (Enter)';
      skipBtn.style.display = 'none';
      dontKnowBtn.style.display = 'none';
      // 정답 맞췄을 때만 숙지 버튼 노출
      if (lastWasCorrect && currentQ) {
        const isMastered = getQ(currentQ.id).mastered;
        masterBtn.style.display = '';
        masterBtn.textContent = isMastered ? '✓ 숙지됨 (+)' : '✓ 숙지 (+)';
        masterBtn.classList.toggle('active', isMastered);
      } else {
        masterBtn.style.display = 'none';
      }
      // 되돌리기 버튼은 스냅샷이 있을 때만
      undoBtn.style.display = lastSnapshot ? '' : 'none';
    } else if (currentQ?.type === 'mc' || currentQ?.type === 'ox') {
      submitBtn.style.display = 'none';
      skipBtn.style.display = '';
      dontKnowBtn.style.display = '';
      masterBtn.style.display = 'none';
      undoBtn.style.display = 'none';
    } else {
      submitBtn.style.display = '';
      submitBtn.textContent = '제출 (Enter)';
      skipBtn.style.display = '';
      dontKnowBtn.style.display = '';
      masterBtn.style.display = 'none';
      undoBtn.style.display = 'none';
    }
  }

  function undoSubmission() {
    if (!lastSnapshot) return;
    const snap = lastSnapshot;
    const qState = getQ(snap.qId);
    Object.assign(qState, snap.qStateBefore);
    currentQ = snap.qRef;
    awaitingNext = false;
    lastWasCorrect = false;
    lastSnapshot = null;
    resultDiv.innerHTML = '';
    // 모드 배지/북마크는 그대로. 답안 영역만 새로 (입력 활성화)
    questionText.innerHTML = currentQ.promptHtml;
    renderAnswerArea(currentQ);
    saveAppState();
    updateButtons();
    updateStats();
    updateBookmarkList();
    updateWrongList();
    updateMasterList();
    updateHighPriorityList();
    showToast('제출을 되돌렸습니다', '#1976d2');
  }

  // ===== 답안 가져오기 / 검사 =====
  function getUserAnswer() {
    if (!currentQ) return null;
    if (currentQ.type === 'def' || currentQ.type === 'cloze') {
      const inp = document.getElementById('answerInput');
      return inp ? inp.value.trim() : '';
    }
    if (currentQ.type === 'list') {
      const inputs = answerArea.querySelectorAll('.list-input');
      return Array.from(inputs).map(i => i.value.trim());
    }
    if (currentQ.type === 'cloze-multi') {
      // 그룹별 첫 입력만 수집 (동기화되어 있으므로 동일)
      const inputs = questionText.querySelectorAll('input.multi-blank');
      const byGroup = {};
      inputs.forEach(inp => {
        const gi = inp.dataset.groupIdx;
        if (!(gi in byGroup)) byGroup[gi] = inp.value.trim();
      });
      return currentQ.answer.map((_, i) => byGroup[i] || '');
    }
    return null;
  }
  function isAnswerCorrect(userAnswer) {
    if (currentQ.type === 'def' || currentQ.type === 'cloze') {
      const norm = normalizeAns(userAnswer);
      const accepts = acceptedList(currentQ.answer).map(normalizeAns);
      return accepts.includes(norm);
    }
    if (currentQ.type === 'mc' || currentQ.type === 'ox') {
      return normalizeAns(userAnswer) === normalizeAns(currentQ.answer);
    }
    if (currentQ.type === 'list') {
      const vals = userAnswer.map(normalizeAns).filter(Boolean);
      if (vals.length !== currentQ.answer.length) return false;
      const seen = new Set();
      for (const v of vals) { if (seen.has(v)) return false; seen.add(v); }
      const slots = currentQ.answer.map(item =>
        acceptedList(item).map(normalizeAns)
      );
      return matchListSlots(vals, slots);
    }
    if (currentQ.type === 'cloze-multi') {
      // 위치별 채점: 각 그룹의 정답 후보 중 하나와 일치해야 함
      return currentQ.answer.every((ans, i) => {
        const accepts = acceptedList(ans).map(normalizeAns);
        return accepts.includes(normalizeAns(userAnswer[i] || ''));
      });
    }
    return false;
  }

  // ===== 제출 처리 =====
  function handleSubmit(mcChoice, dontKnow) {
    if (!currentQ) return;
    if (awaitingNext) { renderQuestion(); return; }

    let userAnswer = null;
    let correct = false;

    if (!dontKnow) {
      if (currentQ.type === 'mc' || currentQ.type === 'ox') {
        if (mcChoice == null) return;  // 보기 클릭으로만 답
        userAnswer = mcChoice;
      } else {
        userAnswer = getUserAnswer();
        if (currentQ.type === 'list') {
          if (!userAnswer || userAnswer.every(v => !v)) return;
        } else {
          if (!userAnswer) return;
        }
      }
      correct = isAnswerCorrect(userAnswer);
    }

    const qState = getQ(currentQ.id);
    // 되돌리기용 스냅샷 (상태 변경 직전)
    lastSnapshot = {
      qId: currentQ.id,
      qRef: currentQ,
      qStateBefore: {
        attempts: qState.attempts,
        weight: qState.weight,
        correct: qState.correct,
        wrong: qState.wrong,
        lastResult: qState.lastResult,
        lastCycle: qState.lastCycle,
      },
    };
    qState.attempts++;
    qState.lastCycle = chapterCycle(currentQ.chapter);
    if (correct) {
      qState.weight = Math.max(1, qState.weight - 1);
      qState.correct++;
      qState.lastResult = 'correct';
    } else {
      qState.weight += 2;
      qState.wrong++;
      qState.lastResult = dontKnow ? 'dontKnow' : 'wrong';
    }

    // 입력 비활성화
    if (currentQ.type === 'def' || currentQ.type === 'cloze') {
      const inp = document.getElementById('answerInput');
      if (inp) inp.disabled = true;
    } else if (currentQ.type === 'list') {
      const inputs = answerArea.querySelectorAll('.list-input');
      let valueToSlot, unmatchedSlots;
      if (dontKnow) {
        valueToSlot = new Array(inputs.length).fill(-1);
        unmatchedSlots = currentQ.answer.map((_, i) => i);
      } else {
        const slots = currentQ.answer.map(item => acceptedList(item).map(normalizeAns));
        const normVals = (Array.isArray(userAnswer) ? userAnswer : []).map(v => normalizeAns(v || ''));
        ({ valueToSlot, unmatchedSlots } = matchListAssignment(normVals, slots));
      }
      inputs.forEach((inp, i) => {
        inp.disabled = true;
        const isCorrect = valueToSlot[i] !== -1;
        inp.classList.add(isCorrect ? 'correct' : 'wrong');
        const marker = document.createElement('span');
        marker.className = 'list-marker ' + (isCorrect ? 'correct' : 'wrong');
        marker.textContent = isCorrect ? '✓' : '✗';
        inp.parentNode.appendChild(marker);
      });
      if (unmatchedSlots.length > 0) {
        const missedDiv = document.createElement('div');
        missedDiv.className = 'missed-answers';
        const label = dontKnow ? '정답:' : '놓친 정답:';
        missedDiv.innerHTML = `<span class="label">${label}</span>` +
          unmatchedSlots.map(s => `<span class="missed-answer-chip">${escapeHtml(canonical(currentQ.answer[s] || ''))}</span>`).join('');
        answerArea.appendChild(missedDiv);
      }
    } else if (currentQ.type === 'cloze-multi') {
      const inputs = questionText.querySelectorAll('input.multi-blank');
      const byGroupMark = {};
      currentQ.answer.forEach((ans, i) => {
        const accepts = acceptedList(ans).map(normalizeAns);
        const val = Array.isArray(userAnswer) ? userAnswer[i] : '';
        byGroupMark[i] = accepts.includes(normalizeAns(val || ''));
      });
      inputs.forEach(inp => {
        inp.disabled = true;
        const gi = inp.dataset.groupIdx;
        const groupOk = !dontKnow && byGroupMark[gi];
        const userTyped = inp.value;
        const correctAns = canonical(currentQ.answer[gi] || '');
        if (groupOk) {
          inp.classList.add('correct');
        } else {
          if (!inp.value) inp.value = correctAns;
          inp.classList.add('wrong');
        }
        // ✓/✗ 마커
        const marker = document.createElement('span');
        marker.className = 'blank-marker ' + (groupOk ? 'correct' : 'wrong');
        marker.textContent = groupOk ? '✓' : '✗';
        inp.after(marker);
        // 오답 + 사용자가 무언가 입력한 경우 정답 힌트 인라인 표시
        if (!groupOk && userTyped && normalizeAns(userTyped) !== normalizeAns(correctAns)) {
          const hint = document.createElement('span');
          hint.className = 'blank-correct-hint';
          hint.textContent = correctAns;
          marker.after(hint);
        }
      });
    } else if (currentQ.type === 'mc' || currentQ.type === 'ox') {
      const sel = currentQ.type === 'ox' ? '.ox-choice' : '.mc-choice';
      answerArea.querySelectorAll(sel).forEach(btn => {
        btn.disabled = true;
        if (normalizeAns(btn.dataset.choice) === normalizeAns(currentQ.answer)) {
          btn.classList.add('correct');
        } else if (userAnswer != null && normalizeAns(btn.dataset.choice) === normalizeAns(userAnswer) && !correct) {
          btn.classList.add('wrong');
        }
      });
    }

    showResult(correct, userAnswer, dontKnow);
    saveAppState();
    noteAnswerSubmitted();
    updateStats();
    updateBookmarkList();
    updateWrongList();
    updateMasterList();
    updateHighPriorityList();
    awaitingNext = true;
    lastWasCorrect = correct && !dontKnow;
    updateButtons();
    submitBtn.focus();
  }

  function showResult(correct, userAnswer, dontKnow) {
    const correctAnswer = Array.isArray(currentQ.answer)
      ? currentQ.answer.map(formatAccepted).join(', ')
      : formatAccepted(currentQ.answer);
    // 정답일 때, 복수 정답(슬래시 대안)이 있으면 학습용으로 같이 보여줌.
    // mc/ox는 보기 버튼에서 이미 보이므로 제외.
    const hasAlts = Array.isArray(currentQ.answer)
      ? currentQ.answer.some(a => acceptedList(a).length > 1)
      : acceptedList(currentQ.answer).length > 1;
    const showAltsOnCorrect = hasAlts && currentQ.type !== 'mc' && currentQ.type !== 'ox';
    let extra = '';
    if ((currentQ.type === 'cloze' || currentQ.type === 'cloze-multi') && currentQ.fullSentence) {
      extra = `<div class="extra">${currentQ.fullSentence}</div>`;
    } else if (currentQ.type === 'ox' && currentQ.explanation) {
      extra = `<div class="extra">${escapeHtml(currentQ.explanation)}</div>`;
    }
    if (dontKnow) {
      resultDiv.innerHTML = `<div class="result wrong">— 모르겠음<div class="answer">정답: ${escapeHtml(correctAnswer)}</div>${extra}</div>`;
    } else if (correct) {
      const altInfo = showAltsOnCorrect
        ? `<div class="answer">정답: ${escapeHtml(correctAnswer)}</div>`
        : '';
      resultDiv.innerHTML = `<div class="result correct">✓ 정답!${altInfo}${extra}</div>`;
    } else {
      resultDiv.innerHTML = `<div class="result wrong">✗ 오답<div class="answer">정답: ${escapeHtml(correctAnswer)}</div>${extra}</div>`;
    }
  }

  // ===== 렌더 =====
  function renderQuestion() {
    resultDiv.innerHTML = '';
    awaitingNext = false;
    lastWasCorrect = false;
    lastSnapshot = null;

    const pool = getPool();
    if (pool.length === 0) {
      questionText.textContent = '선택된 단원·필터에 문제가 없습니다. 단원을 더 선택하거나 북마크/오답 필터를 해제하세요.';
      modeBadge.textContent = '-';
      modeBadge.className = 'mode-badge';
      currentQ = null;
      answerArea.innerHTML = '';
      submitBtn.style.display = 'none';
      skipBtn.style.display = 'none';
      dontKnowBtn.style.display = 'none';
      masterBtn.style.display = 'none';
      undoBtn.style.display = 'none';
      priorityBadgeEl.style.display = 'none';
      updateStats();
      return;
    }

    currentQ = pickQuestion();
    if (!currentQ) {
      // 풀은 있는데 모두 이번 사이클에 풀이 완료
      questionText.innerHTML = '🎉 <strong>이번 차례 풀이 완료!</strong><br>' +
        '<span style="font-size:0.85em;color:#666;line-height:1.6;display:inline-block;margin-top:6px;">' +
        '"초기화" 버튼을 누르면 선택한 단원을 다시 풀 수 있어요.<br>' +
        '또는 "오답만"·"북마크만"·"★ 중요만" 필터로 좁혀서 복습할 수 있습니다.' +
        '</span>';
      modeBadge.textContent = '완료';
      modeBadge.className = 'mode-badge';
      answerArea.innerHTML = '';
      submitBtn.style.display = 'none';
      skipBtn.style.display = 'none';
      dontKnowBtn.style.display = 'none';
      masterBtn.style.display = 'none';
      undoBtn.style.display = 'none';
      priorityBadgeEl.style.display = 'none';
      updateStats();
      return;
    }

    const modeMap = {
      def: ['정의 → 용어', 'mode-def'],
      cloze: ['빈칸 채우기', 'mode-cloze'],
      'cloze-multi': ['종합 빈칸', 'mode-multi'],
      list: ['나열형', 'mode-list'],
      mc: ['객관식', 'mode-mc'],
      ox: ['OX', 'mode-ox'],
    };
    const [modeText, modeCls] = modeMap[currentQ.type] || ['-', ''];
    modeBadge.textContent = modeText;
    modeBadge.className = 'mode-badge ' + modeCls;
    if (currentQ.priority === 'high') {
      priorityBadgeEl.textContent = '★ 중요';
      priorityBadgeEl.className = 'priority-badge priority-high';
      priorityBadgeEl.style.display = '';
    } else if (currentQ.priority === 'low') {
      priorityBadgeEl.textContent = '＃ 포기 가능';
      priorityBadgeEl.className = 'priority-badge priority-low';
      priorityBadgeEl.style.display = '';
    } else {
      priorityBadgeEl.style.display = 'none';
    }
    questionText.innerHTML = currentQ.promptHtml;

    const q = getQ(currentQ.id);
    bookmarkBtn.textContent = q.bookmarked ? '★' : '☆';
    bookmarkBtn.classList.toggle('active', q.bookmarked);

    renderAnswerArea(currentQ);
    updateButtons();
    updateStats();
  }

  function toggleBookmark() {
    if (!currentQ) return;
    const q = getQ(currentQ.id);
    q.bookmarked = !q.bookmarked;
    saveAppState();
    bookmarkBtn.textContent = q.bookmarked ? '★' : '☆';
    bookmarkBtn.classList.toggle('active', q.bookmarked);
    updateBookmarkList();
    // 결과 화면이면 Enter로 다음 진행 가능하도록 포커스 복귀
    if (awaitingNext) submitBtn.focus();
  }

  function toggleMaster() {
    if (!currentQ) return;
    const q = getQ(currentQ.id);
    q.mastered = !q.mastered;
    saveAppState();
    masterBtn.textContent = q.mastered ? '✓ 숙지됨 (+)' : '✓ 숙지 (+)';
    masterBtn.classList.toggle('active', q.mastered);
    updateStats();
    updateMasterList();
    showToast(q.mastered ? '숙지로 표시 — 풀에서 제외' : '숙지 해제 — 풀에 복귀', '#6a1b9a');
    // 결과 화면이면 Enter로 다음 진행 가능하도록 포커스 복귀
    if (awaitingNext) submitBtn.focus();
  }

  function updateStats() {
    const pool = getPool();
    const reviewMode = appState.bookmarkedOnly || appState.wrongOnly || appState.highOnly;
    let answered = 0, correct = 0, wrong = 0;
    pool.forEach(q => {
      const st = getQ(q.id);
      // 카운트도 큐와 동일 규칙으로 — 복습 모드에선 사이클 기준만, 기본 모드에선 isAlreadySolved 기준.
      const done = reviewMode
        ? (st.lastCycle || 0) >= chapterCycle(q.chapter)
        : isAlreadySolved(q);
      if (done) answered++;
      if (st.lastResult === 'correct') correct++;
      else if (st.lastResult === 'wrong' || st.lastResult === 'dontKnow') wrong++;
    });
    document.getElementById('roundProgress').textContent = `${answered} / ${pool.length}`;
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
    document.getElementById('poolCount').textContent = pool.length;
    document.getElementById('totalCount').textContent = allQuestions.length;
    document.getElementById('masteredCount').textContent =
      allQuestions.filter(q => getQ(q.id).mastered).length;
  }

  function updateWrongList() {
    const wrongs = allQuestions.filter(q => {
      const lr = getQ(q.id).lastResult;
      return lr === 'wrong' || lr === 'dontKnow';
    });
    document.getElementById('wrongCount2').textContent = wrongs.length;
    const list = document.getElementById('wrongList');
    if (wrongs.length === 0) {
      list.innerHTML = '<div class="review-item" style="border-top:none;color:#999;">틀린 문제가 없습니다. 문제를 풀면서 오답이 쌓이면 여기 표시됩니다.</div>';
      return;
    }
    const typeLabel = { def: '정의→용어', cloze: '빈칸', 'cloze-multi': '종합빈칸', list: '나열', mc: '객관식', ox: 'OX' };

    // 단원별 그룹핑 (미분류는 -1로)
    const byChapter = new Map();
    wrongs.forEach(q => {
      const k = q.chapter != null && CHAPTERS[q.chapter] ? q.chapter : -1;
      if (!byChapter.has(k)) byChapter.set(k, []);
      byChapter.get(k).push(q);
    });
    const chapterKeys = [...byChapter.keys()].sort((a, b) => a - b);

    list.innerHTML = chapterKeys.map(k => {
      const chapName = k === -1 ? '미분류' : `${k}. ${CHAPTERS[k]}`;
      const items = byChapter.get(k);
      const itemsHtml = items.map(q => {
        const ansStr = Array.isArray(q.answer)
          ? q.answer.map(formatAccepted).join(', ')
          : formatAccepted(q.answer);
        const st = getQ(q.id);
        const mark = st.lastResult === 'dontKnow' ? '모름' : '오답';
        const counts = `${st.wrong}오답 / ${st.attempts}시도`;
        const priorityTag = q.priority === 'high' ? ' · <span class="priority-badge priority-high" style="font-size:0.8em;padding:1px 5px">★ 중요</span>'
                          : q.priority === 'low'  ? ' · <span class="priority-badge priority-low" style="font-size:0.8em;padding:1px 5px">＃ 포기 가능</span>'
                          : '';
        return `
          <div class="review-item">
            <button class="review-unbook" data-id="${q.id}" title="오답 목록에서 제거">✕ 해제</button>
            <div class="review-meta">${typeLabel[q.type] || q.type} · ${mark} · ${counts}${priorityTag}</div>
            <div class="review-q">${q.promptHtml}</div>
            <div class="review-a">→ ${escapeHtml(ansStr)}</div>
          </div>
        `;
      }).join('');
      return `<details class="chapter-group"><summary>${escapeHtml(chapName)} (${items.length})</summary>${itemsHtml}</details>`;
    }).join('');

    list.querySelectorAll('.review-unbook').forEach(btn => {
      btn.addEventListener('click', e => {
        const id = e.currentTarget.dataset.id;
        if (appState.questions[id]) {
          appState.questions[id].lastResult = 'correct';
          appState.questions[id].weight = 1;
          saveAppState();
          updateWrongList();
        }
      });
    });
  }

  function updateBookmarkList() {
    const bookmarked = allQuestions.filter(q => getQ(q.id).bookmarked);
    document.getElementById('bookmarkCount').textContent = bookmarked.length;
    const list = document.getElementById('reviewList');
    if (bookmarked.length === 0) {
      list.innerHTML = '<div class="review-item" style="border-top:none;color:#999;">아직 북마크한 문제가 없습니다. 헷갈리는 문제에서 ★ 버튼을 눌러보세요.</div>';
      return;
    }
    const typeLabel = { def: '정의→용어', cloze: '빈칸', 'cloze-multi': '종합빈칸', list: '나열', mc: '객관식', ox: 'OX' };
    list.innerHTML = bookmarked.map(q => {
      const chapLabel = q.chapter != null && CHAPTERS[q.chapter]
        ? `${q.chapter}단원 · ${CHAPTERS[q.chapter]}`
        : '미분류';
      const ansStr = Array.isArray(q.answer)
        ? q.answer.map(formatAccepted).join(', ')
        : formatAccepted(q.answer);
      const priorityTag = q.priority === 'high' ? ' · <span class="priority-badge priority-high" style="font-size:0.8em;padding:1px 5px">★ 중요</span>'
                        : q.priority === 'low'  ? ' · <span class="priority-badge priority-low" style="font-size:0.8em;padding:1px 5px">＃ 포기 가능</span>'
                        : '';
      return `
        <div class="review-item">
          <button class="review-unbook" data-id="${q.id}" title="북마크 해제">✕ 해제</button>
          <div class="review-meta">${escapeHtml(chapLabel)} · ${typeLabel[q.type] || q.type}${priorityTag}</div>
          <div class="review-q">${q.promptHtml}</div>
          <div class="review-a">→ ${escapeHtml(ansStr)}</div>
        </div>
      `;
    }).join('');
    list.querySelectorAll('.review-unbook').forEach(btn => {
      btn.addEventListener('click', e => {
        const id = e.currentTarget.dataset.id;
        if (appState.questions[id]) {
          appState.questions[id].bookmarked = false;
          saveAppState();
          updateBookmarkList();
          if (currentQ && currentQ.id === id) {
            bookmarkBtn.textContent = '☆';
            bookmarkBtn.classList.remove('active');
          }
        }
      });
    });
  }

  function updateMasterList() {
    const mastered = allQuestions.filter(q => getQ(q.id).mastered);
    document.getElementById('masteredCount2').textContent = mastered.length;
    const list = document.getElementById('masteredList');
    if (mastered.length === 0) {
      list.innerHTML = '<div class="review-item" style="border-top:none;color:#999;">아직 숙지로 표시한 문제가 없습니다. 정답을 맞춘 후 "✓ 숙지" 버튼을 눌러 풀에서 제외할 수 있습니다.</div>';
      return;
    }
    const typeLabel = { def: '정의→용어', cloze: '빈칸', 'cloze-multi': '종합빈칸', list: '나열', mc: '객관식', ox: 'OX' };
    list.innerHTML = mastered.map(q => {
      const chapLabel = q.chapter != null && CHAPTERS[q.chapter]
        ? `${q.chapter}단원 · ${CHAPTERS[q.chapter]}`
        : '미분류';
      const ansStr = Array.isArray(q.answer)
        ? q.answer.map(formatAccepted).join(', ')
        : formatAccepted(q.answer);
      const priorityTag = q.priority === 'high' ? ' · <span class="priority-badge priority-high" style="font-size:0.8em;padding:1px 5px">★ 중요</span>'
                        : q.priority === 'low'  ? ' · <span class="priority-badge priority-low" style="font-size:0.8em;padding:1px 5px">＃ 포기 가능</span>'
                        : '';
      return `
        <div class="review-item">
          <button class="review-unbook" data-id="${q.id}" title="숙지 해제 — 풀에 다시 등장">✕ 해제</button>
          <div class="review-meta">${escapeHtml(chapLabel)} · ${typeLabel[q.type] || q.type}${priorityTag}</div>
          <div class="review-q">${q.promptHtml}</div>
          <div class="review-a">→ ${escapeHtml(ansStr)}</div>
        </div>
      `;
    }).join('');
    list.querySelectorAll('.review-unbook').forEach(btn => {
      btn.addEventListener('click', e => {
        const id = e.currentTarget.dataset.id;
        if (appState.questions[id]) {
          appState.questions[id].mastered = false;
          saveAppState();
          updateMasterList();
          updateStats();
          if (currentQ && currentQ.id === id) {
            masterBtn.textContent = '✓ 숙지 (+)';
            masterBtn.classList.remove('active');
          }
        }
      });
    });
  }

  function updateHighPriorityList() {
    const highs = allQuestions.filter(q => q.priority === 'high');
    document.getElementById('highPriorityCount').textContent = highs.length;
    const list = document.getElementById('highPriorityList');
    if (highs.length === 0) {
      list.innerHTML = '<div class="review-item" style="border-top:none;color:#999;">★ 중요로 표시된 문제가 없습니다. 데이터 파일에서 @ 줄 끝에 ★를 붙이면 여기 표시됩니다.</div>';
      return;
    }
    const typeLabel = { def: '정의→용어', cloze: '빈칸', 'cloze-multi': '종합빈칸', list: '나열', mc: '객관식', ox: 'OX' };
    const byChapter = new Map();
    highs.forEach(q => {
      const k = q.chapter != null && CHAPTERS[q.chapter] ? q.chapter : -1;
      if (!byChapter.has(k)) byChapter.set(k, []);
      byChapter.get(k).push(q);
    });
    const chapterKeys = [...byChapter.keys()].sort((a, b) => a - b);
    list.innerHTML = chapterKeys.map(k => {
      const chapName = k === -1 ? '미분류' : `${k}. ${CHAPTERS[k]}`;
      const items = byChapter.get(k);
      const itemsHtml = items.map(q => {
        const ansStr = Array.isArray(q.answer)
          ? q.answer.map(formatAccepted).join(', ')
          : formatAccepted(q.answer);
        const st = getQ(q.id);
        const masteredTag = st.mastered ? ' · <span style="color:#6a1b9a">숙지</span>' : '';
        return `
          <div class="review-item">
            <div class="review-meta">${typeLabel[q.type] || q.type}${masteredTag}</div>
            <div class="review-q">${q.promptHtml}</div>
            <div class="review-a">→ ${escapeHtml(ansStr)}</div>
          </div>
        `;
      }).join('');
      return `<details class="chapter-group"><summary>${escapeHtml(chapName)} (${items.length})</summary>${itemsHtml}</details>`;
    }).join('');
  }

  // ===== 이벤트 =====
  submitBtn.addEventListener('click', () => handleSubmit());
  skipBtn.addEventListener('click', () => {
    // 건너뛰기: 풀이 상태 변경 없이 다른 문제를 픽 (이번 사이클에 다시 나올 수 있음)
    renderQuestion();
  });
  dontKnowBtn.addEventListener('click', () => handleSubmit(null, true));
  bookmarkBtn.addEventListener('click', toggleBookmark);
  masterBtn.addEventListener('click', toggleMaster);
  undoBtn.addEventListener('click', undoSubmission);
  bookmarkedOnlyEl.addEventListener('change', e => {
    appState.bookmarkedOnly = e.target.checked;
    saveAppState();
    onFilterChange();
  });
  wrongOnlyEl.addEventListener('change', e => {
    appState.wrongOnly = e.target.checked;
    saveAppState();
    onFilterChange();
  });
  highOnlyEl.addEventListener('change', e => {
    appState.highOnly = e.target.checked;
    saveAppState();
    onFilterChange();
  });
  includeLowPriorityEl.addEventListener('change', e => {
    appState.includeLowPriority = e.target.checked;
    saveAppState();
    onFilterChange();
  });
  // ===== 내보내기 / 가져오기 =====
  function _openHandleDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open('quiz-fs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
      req.onsuccess = e => res(e.target.result);
      req.onerror = () => rej(req.error);
    });
  }
  async function _getHandle(key) {
    try {
      const db = await _openHandleDB();
      return await new Promise(res => {
        db.transaction('handles').objectStore('handles').get(key).onsuccess = e => res(e.target.result ?? null);
      });
    } catch { return null; }
  }
  async function _setHandle(key, handle) {
    try {
      const db = await _openHandleDB();
      await new Promise(res => {
        const tx = db.transaction('handles', 'readwrite');
        tx.objectStore('handles').put(handle, key);
        tx.oncomplete = res;
      });
    } catch {}
  }
  async function exportData() {
    const json = localStorage.getItem(STORAGE_KEY) || '{}';
    if ('showSaveFilePicker' in window) {
      try {
        let handle = await _getHandle('quiz-backup');
        if (handle) {
          let perm = await handle.queryPermission({ mode: 'readwrite' });
          if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
          if (perm === 'granted') {
            const writable = await handle.createWritable();
            await writable.write(json);
            await writable.close();
            markFileSaved();
            showToast('저장됨', '#2e7d32');
            return;
          }
        }
        handle = await window.showSaveFilePicker({
          suggestedName: 'quiz_backup.json',
          startIn: handle ?? 'documents',
          types: [{ description: 'JSON 파일', accept: { 'application/json': ['.json'] } }],
        });
        await _setHandle('quiz-backup', handle);
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        markFileSaved();
        showToast('저장됨', '#2e7d32');
        return;
      } catch (e) {
        if (e.name === 'AbortError') return;
      }
    }
    const ts = new Date().toISOString().slice(0, 10);
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `quiz_backup_${ts}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    markFileSaved();
    showToast('저장됨', '#2e7d32');
  }
  async function importData() {
    if ('showOpenFilePicker' in window) {
      try {
        const savedHandle = await _getHandle('quiz-backup');
        const [handle] = await window.showOpenFilePicker({
          startIn: savedHandle ?? 'documents',
          types: [{ description: 'JSON 파일', accept: { 'application/json': ['.json'] } }],
        });
        const text = await (await handle.getFile()).text();
        try {
          const parsed = JSON.parse(text);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
          appState = loadAppState();
          migrateQuestionIds();
          currentQ = null;
          bookmarkedOnlyEl.checked = appState.bookmarkedOnly;
          wrongOnlyEl.checked = appState.wrongOnly;
          highOnlyEl.checked = appState.highOnly;
          includeLowPriorityEl.checked = appState.includeLowPriority;
          renderChapterChips();
          updateBookmarkList();
          updateWrongList();
          updateMasterList();
          updateHighPriorityList();
          renderQuestion();
          showToast('가져오기 완료', '#1976d2');
        } catch {
          showToast('파일 형식이 올바르지 않습니다', '#c62828');
        }
        return;
      } catch (e) {
        if (e.name === 'AbortError') return;
      }
    }
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
          appState = loadAppState();
          migrateQuestionIds();
          currentQ = null;
          bookmarkedOnlyEl.checked = appState.bookmarkedOnly;
          wrongOnlyEl.checked = appState.wrongOnly;
          highOnlyEl.checked = appState.highOnly;
          includeLowPriorityEl.checked = appState.includeLowPriority;
          renderChapterChips();
          updateBookmarkList();
          updateWrongList();
          updateMasterList();
          updateHighPriorityList();
          renderQuestion();
          showToast('가져오기 완료', '#1976d2');
        } catch {
          showToast('파일 형식이 올바르지 않습니다', '#c62828');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', importData);
  document.getElementById('resetDataBtn').addEventListener('click', () => {
    const selected = (appState.chapters || []).slice().sort((a, b) => a - b);
    if (selected.length === 0) {
      showToast('선택된 단원이 없습니다', '#c62828');
      return;
    }
    const names = selected.map(c => `${c}. ${CHAPTERS[c] || '미분류'}`).join('\n');
    if (!confirm(`다음 단원의 풀이 진행을 초기화합니다:\n\n${names}\n\n오답 노트·북마크·숙지·문제별 가중치는 유지됩니다.\n\n계속할까요?`)) return;
    if (!appState.cycles) appState.cycles = {};
    selected.forEach(c => {
      appState.cycles[c] = (appState.cycles[c] || 1) + 1;
    });
    saveAppState();
    currentQ = null;
    renderQuestion();
    showToast(`${selected.length}개 단원 초기화 완료`, '#1976d2');
  });
  // 도움말 모달
  const helpBtn = document.getElementById('helpBtn');
  const helpModal = document.getElementById('helpModal');
  const helpClose = document.getElementById('helpClose');
  function showHelp() { helpModal.style.display = 'flex'; }
  function hideHelp() { helpModal.style.display = 'none'; }
  helpBtn.addEventListener('click', showHelp);
  helpClose.addEventListener('click', hideHelp);
  helpModal.addEventListener('click', e => { if (e.target === helpModal) hideHelp(); });

  // 전역 단축키
  document.addEventListener('keydown', e => {
    // Ctrl+S → 내보내기 (항상)
    if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      exportData();
      return;
    }
    // 도움말 열려있을 땐 Esc로 닫기만
    if (helpModal.style.display !== 'none') {
      if (e.key === 'Escape') { e.preventDefault(); hideHelp(); }
      return;
    }
    if (!currentQ) return;

    // Enter → 다음 (결과 화면에서, 입력 필드 밖일 때 — 포커스가 다른 버튼에 가있어도 항상 동작)
    if (e.key === 'Enter' && awaitingNext) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      e.preventDefault();
      renderQuestion();
      return;
    }

    // Esc → 되돌리기 (결과 화면 + 스냅샷 있을 때)
    if (e.key === 'Escape' && awaitingNext && lastSnapshot) {
      e.preventDefault();
      undoSubmission();
      return;
    }

    // * (Shift+8) → 북마크 토글 (항상)
    if (e.key === '*') {
      e.preventDefault();
      toggleBookmark();
      return;
    }

    // + (Shift+=) → 숙지 토글 (결과 화면 + 정답일 때만)
    if (e.key === '+') {
      if (awaitingNext && lastWasCorrect) {
        e.preventDefault();
        toggleMaster();
      }
      return;
    }

    // 이하는 답변 단계에서만
    if (awaitingNext) return;

    // > (Shift+.) → 건너뛰기
    if (e.key === '>') {
      e.preventDefault();
      renderQuestion();
      return;
    }

    // ? (Shift+/) → 모르겠음 (입력 필드 안에서도 동작)
    if (e.key === '?') {
      e.preventDefault();
      handleSubmit(null, true);
      return;
    }

    // 숫자키 단축키 (객관식/OX, 입력 필드 밖에서만)
    if (currentQ.type !== 'mc' && currentQ.type !== 'ox') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= currentQ.choices.length) {
      e.preventDefault();
      handleSubmit(currentQ.choices[n - 1]);
    }
  });

  // ===== 초기화 =====
  bookmarkedOnlyEl.checked = appState.bookmarkedOnly;
  wrongOnlyEl.checked = appState.wrongOnly;
  highOnlyEl.checked = appState.highOnly;
  includeLowPriorityEl.checked = appState.includeLowPriority;
  renderChapterChips();
  updateBookmarkList();
  updateWrongList();
  updateMasterList();
  updateHighPriorityList();
  renderQuestion();
  document.getElementById('backupIndicator').addEventListener('click', setupOrContinueAutoBackup);
  initBackupSystem();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch((err) => {
        console.warn('Service Worker 등록 실패:', err);
      });
    });
  }
</script>
</body>
